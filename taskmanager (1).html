<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayFlow — Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --border: #2a2a38;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --accent3: #5cf0c8;
    --text: #e8e8f0;
    --muted: #6b6b82;
    --tag-work: #7c5cfc22;
    --tag-work-border: #7c5cfc55;
    --tag-meeting: #fc5c7d22;
    --tag-meeting-border: #fc5c7d55;
    --tag-personal: #5cf0c822;
    --tag-personal-border: #5cf0c855;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,92,252,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    background: linear-gradient(135deg, #7c5cfc, #fc5c7d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .date-block {
    text-align: right;
  }

  .date-today {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .date-value {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  /* Stats bar */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 36px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.all::after { background: var(--muted); }
  .stat-card.pending::after { background: #fbbf24; }
  .stat-card.done::after { background: var(--accent3); }
  .stat-card.meetings::after { background: var(--accent2); }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }

  .stat-card.all .stat-num { color: var(--text); }
  .stat-card.pending .stat-num { color: #fbbf24; }
  .stat-card.done .stat-num { color: var(--accent3); }
  .stat-card.meetings .stat-num { color: var(--accent2); }

  /* Progress */
  .progress-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    margin-bottom: 28px;
    animation: fadeDown 0.6s 0.15s ease both;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* Input area */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 28px;
    animation: fadeDown 0.6s 0.2s ease both;
    transition: border-color 0.2s;
  }

  .input-section:focus-within {
    border-color: var(--accent);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .task-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
    padding: 6px 0;
  }

  .task-input::placeholder { color: var(--muted); }

  .input-meta {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    align-items: center;
    flex-wrap: wrap;
  }

  .category-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .category-btn.active[data-cat="work"] {
    background: var(--tag-work);
    border-color: var(--tag-work-border);
    color: #a78bfa;
  }
  .category-btn.active[data-cat="meeting"] {
    background: var(--tag-meeting);
    border-color: var(--tag-meeting-border);
    color: #fb7185;
  }
  .category-btn.active[data-cat="personal"] {
    background: var(--tag-personal);
    border-color: var(--tag-personal-border);
    color: #34d399;
  }

  .priority-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
  }

  .add-btn {
    margin-left: auto;
    background: linear-gradient(135deg, var(--accent), #9b6fff);
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    letter-spacing: 0.3px;
  }

  .add-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .add-btn:active { transform: translateY(0); }

  /* Filter tabs */
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    animation: fadeDown 0.6s 0.25s ease both;
    flex-wrap: wrap;
  }

  .filter-tab {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .filter-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeDown 0.6s 0.3s ease both;
  }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
    animation: slideIn 0.3s ease both;
  }

  .task-item:hover {
    border-color: #3a3a50;
    background: var(--surface2);
  }

  .task-item.done {
    opacity: 0.5;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .check-btn {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: transparent;
    font-size: 12px;
  }

  .task-item.done .check-btn {
    background: var(--accent3);
    border-color: var(--accent3);
    color: #0c0c0f;
  }

  .check-btn:hover { border-color: var(--accent3); }

  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tag {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .tag-work { background: var(--tag-work); border: 1px solid var(--tag-work-border); color: #a78bfa; }
  .tag-meeting { background: var(--tag-meeting); border: 1px solid var(--tag-meeting-border); color: #fb7185; }
  .tag-personal { background: var(--tag-personal); border: 1px solid var(--tag-personal-border); color: #34d399; }

  .priority-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .p-high { background: #f87171; }
  .p-medium { background: #fbbf24; }
  .p-low { background: #6b6b82; }

  .task-time {
    font-size: 10px;
    color: var(--muted);
  }

  .delete-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    font-size: 16px;
    transition: color 0.15s, background 0.15s;
    display: flex; align-items: center;
    flex-shrink: 0;
  }

  .delete-btn:hover { color: var(--accent2); background: rgba(252,92,125,0.1); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 13px; letter-spacing: 0.5px; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .header { flex-direction: column; gap: 12px; }
    .date-block { text-align: left; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="brand">DayFlow</div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:1px;">YOUR DAY, ORGANIZED</div>
    </div>
    <div class="date-block">
      <div class="date-today">Today</div>
      <div class="date-value" id="dateVal"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card all">
      <div class="stat-label">Total</div>
      <div class="stat-num" id="statTotal">0</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-label">Pending</div>
      <div class="stat-num" id="statPending">0</div>
    </div>
    <div class="stat-card done">
      <div class="stat-label">Done</div>
      <div class="stat-num" id="statDone">0</div>
    </div>
    <div class="stat-card meetings">
      <div class="stat-label">Meetings</div>
      <div class="stat-num" id="statMeetings">0</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-label">
      <span>Day Progress</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-row">
      <span style="color:var(--muted);font-size:16px">›</span>
      <input class="task-input" id="taskInput" type="text" placeholder="Add a task or meeting..." maxlength="120">
    </div>
    <div class="input-meta">
      <button class="category-btn" data-cat="work" onclick="selectCat('work',this)">Work</button>
      <button class="category-btn" data-cat="meeting" onclick="selectCat('meeting',this)">Meeting</button>
      <button class="category-btn" data-cat="personal" onclick="selectCat('personal',this)">Personal</button>
      <select class="priority-select" id="prioritySelect">
        <option value="medium">Med priority</option>
        <option value="high">High priority</option>
        <option value="low">Low priority</option>
      </select>
      <button class="add-btn" onclick="addTask()">+ Add</button>
    </div>
  </div>

  <!-- Filter tabs -->
  <div class="filter-bar">
    <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-tab" data-filter="pending" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-tab" data-filter="done" onclick="setFilter('done',this)">Done</button>
    <button class="filter-tab" data-filter="work" onclick="setFilter('work',this)">Work</button>
    <button class="filter-tab" data-filter="meeting" onclick="setFilter('meeting',this)">Meetings</button>
    <button class="filter-tab" data-filter="personal" onclick="setFilter('personal',this)">Personal</button>
  </div>

  <!-- Task list -->
  <div class="task-list" id="taskList"></div>

</div>

<script>
  // State
  let tasks = JSON.parse(localStorage.getItem('dayflow_tasks') || '[]');
  let selectedCat = 'work';
  let currentFilter = 'all';

  // Date
  const now = new Date();
  document.getElementById('dateVal').textContent = now.toLocaleDateString('en-US', {
    weekday: 'long', month: 'short', day: 'numeric'
  });

  // Load demo tasks if empty
  if (tasks.length === 0) {
    const t = Date.now();
    tasks = [
      { id: t+1, text: 'Review project proposal deck', cat: 'work', priority: 'high', done: false, time: fmtTime(new Date()) },
      { id: t+2, text: 'Standup with engineering team', cat: 'meeting', priority: 'medium', done: false, time: fmtTime(new Date()) },
      { id: t+3, text: 'Reply to client emails', cat: 'work', priority: 'high', done: false, time: fmtTime(new Date()) },
      { id: t+4, text: 'Q3 planning sync', cat: 'meeting', priority: 'high', done: false, time: fmtTime(new Date()) },
      { id: t+5, text: 'Lunch break', cat: 'personal', priority: 'low', done: true, time: fmtTime(new Date()) },
    ];
    save();
  }

  function fmtTime(d) {
    return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  function save() {
    localStorage.setItem('dayflow_tasks', JSON.stringify(tasks));
  }

  function selectCat(cat, btn) {
    selectedCat = cat;
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    const priority = document.getElementById('prioritySelect').value;
    tasks.unshift({
      id: Date.now(),
      text,
      cat: selectedCat,
      priority,
      done: false,
      time: fmtTime(new Date())
    });
    input.value = '';
    save();
    render();
  }

  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function render() {
    // Filter
    let visible = tasks;
    if (currentFilter === 'pending') visible = tasks.filter(t => !t.done);
    else if (currentFilter === 'done') visible = tasks.filter(t => t.done);
    else if (['work','meeting','personal'].includes(currentFilter)) visible = tasks.filter(t => t.cat === currentFilter);

    // Stats
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const pending = total - done;
    const meetings = tasks.filter(t => t.cat === 'meeting').length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statDone').textContent = done;
    document.getElementById('statMeetings').textContent = meetings;

    // Progress
    const pct = total ? Math.round((done/total)*100) : 0;
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';

    // List
    const list = document.getElementById('taskList');
    if (visible.length === 0) {
      list.innerHTML = `<div class="empty">
        <div class="empty-icon">◎</div>
        <div class="empty-text">No tasks here. Add one above.</div>
      </div>`;
      return;
    }

    list.innerHTML = visible.map(t => {
      const tagClass = `tag-${t.cat}`;
      const dotClass = `p-${t.priority}`;
      const doneClass = t.done ? 'done' : '';
      const checkChar = t.done ? '✓' : '';
      return `
        <div class="task-item ${doneClass}" id="task-${t.id}">
          <button class="check-btn" onclick="toggle(${t.id})">${checkChar}</button>
          <div class="task-body">
            <div class="task-text">${escHtml(t.text)}</div>
            <div class="task-meta">
              <span class="tag ${tagClass}">${t.cat}</span>
              <span class="priority-dot ${dotClass}" title="${t.priority} priority"></span>
              <span class="task-time">${t.time}</span>
            </div>
          </div>
          <button class="delete-btn" onclick="remove(${t.id})" title="Delete">×</button>
        </div>
      `;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter to add
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // Init select default
  document.querySelector('[data-cat="work"]').classList.add('active');

  render();
</script>
</body>
</html>
